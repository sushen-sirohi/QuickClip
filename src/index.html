<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuickClip</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=sf-pro-display, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif"
    rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- Icons (Lucide) -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'],
          },
          colors: {
            active: '#3b82f6',
          },
          animation: {
            'fade-in': 'fadeIn 0.1s ease-out forwards',
            'slide-up': 'slideUp 0.3s ease-out forwards',
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' },
            },
            slideUp: {
              '0%': { transform: 'translateY(5px)', opacity: '0' },
              '100%': { transform: 'translateY(0)', opacity: '1' },
            }
          }
        }
      }
    }
  </script>

  <link rel="stylesheet" href="styles.css" />
  <script type="module" src="/main.js" defer></script>

  <style>
    .tab-btn.active {
      background-color: rgba(255, 255, 255, 0.1);
      color: white;
      font-weight: 500;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
    }

    .tab-btn:hover:not(.active) {
      background-color: rgba(255, 255, 255, 0.05);
    }
  </style>
</head>

<body class="bg-[#191919] text-slate-200 h-screen w-screen overflow-hidden flex flex-col select-none font-sans">
  <!-- Subtle Background Blurs (Toned down) -->
  <div
    class="fixed top-[-20%] left-[-10%] w-[500px] h-[500px] bg-blue-600/5 rounded-full blur-[120px] pointer-events-none z-0">
  </div>
  <div
    class="fixed bottom-[-10%] right-[-10%] w-[400px] h-[400px] bg-blue-600/5 rounded-full blur-[100px] pointer-events-none z-0">
  </div>

  <!-- Top Section: Search & Tabs -->
  <div class="relative z-20 pt-4 pb-2 px-4 w-full flex flex-col gap-3" data-tauri-drag-region>

    <!-- Search Bar -->
    <div class="relative group">
      <div
        class="relative flex items-center bg-[#2a2a2a]/90 backdrop-blur-xl border border-white/5 rounded-xl px-3 py-2.5 shadow-sm transition-all duration-200 focus-within:ring-2 focus-within:ring-blue-500/30 focus-within:bg-[#333]">
        <i data-lucide="search" class="w-4 h-4 text-slate-400 mr-2.5"></i>
        <input type="text" id="search-input" placeholder="Search..."
          class="bg-transparent border-none outline-none w-full text-zinc-100 placeholder-slate-500 text-[14px] leading-relaxed"
          autofocus spellcheck="false" autocomplete="off" />
        <div class="flex items-center gap-2 text-[10px] text-slate-500 font-medium ml-2">
          <span class="bg-white/5 px-1.5 py-0.5 rounded border border-white/5">ESC</span>
        </div>
      </div>
    </div>

    <!-- Tabs Segmented Control -->
    <div id="tabs-container" class="flex p-1 bg-black/20 rounded-lg backdrop-blur-md self-start border border-white/5">
      <button class="tab-btn active px-3 py-1 text-[11px] font-medium rounded-md text-slate-300 transition-all"
        data-tab="all">All</button>
      <button class="tab-btn px-3 py-1 text-[11px] font-medium rounded-md text-slate-400 transition-all"
        data-tab="text">Text</button>
      <button class="tab-btn px-3 py-1 text-[11px] font-medium rounded-md text-slate-400 transition-all"
        data-tab="image">Images</button>
      <button class="tab-btn px-3 py-1 text-[11px] font-medium rounded-md text-slate-400 transition-all"
        data-tab="link">Links</button>
    </div>
  </div>

  <!-- Main List Area -->
  <div id="clipboard-list"
    class="relative z-10 flex-1 overflow-y-auto px-4 pb-20 space-y-2 custom-scrollbar scroll-smooth">
    <!-- Content populated by JS -->
    <div class="flex flex-col items-center justify-center h-full text-slate-500 animate-pulse">
      <p class="text-sm">Loading...</p>
    </div>
  </div>

  <!-- Bottom AI Toolbar -->
  <div id="ai-toolbar"
    class="fixed bottom-5 left-1/2 -translate-x-1/2 z-50 w-auto transition-transform duration-300 translate-y-0">
    <div
      class="flex items-center gap-1.5 p-1.5 bg-[#252525]/90 backdrop-blur-2xl border border-white/10 rounded-full shadow-2xl ring-1 ring-black/50 transition-all hover:scale-[1.02] duration-300">

      <button
        class="flex items-center gap-2 px-4 py-2 rounded-full text-zinc-100 font-medium text-xs hover:bg-white/10 transition-colors group relative">
        <i data-lucide="sparkles" class="w-3.5 h-3.5 text-blue-400 group-hover:text-blue-300 transition-colors"></i>
        <span>Refine</span>
      </button>

      <div class="w-px h-5 bg-white/10 mx-1"></div>

      <button class="p-2 rounded-full text-slate-400 hover:text-zinc-100 hover:bg-white/10 transition-colors group"
        title="Shorten">
        <i data-lucide="ruler" class="w-3.5 h-3.5"></i>
      </button>

      <button class="p-2 rounded-full text-slate-400 hover:text-zinc-100 hover:bg-white/10 transition-colors group"
        title="Fix Grammar">
        <i data-lucide="languages" class="w-3.5 h-3.5"></i>
      </button>

      <button class="p-2 rounded-full text-slate-400 hover:text-zinc-100 hover:bg-white/10 transition-colors group"
        title="Expand">
        <i data-lucide="maximize-2" class="w-3.5 h-3.5"></i>
      </button>

      <div class="w-px h-5 bg-white/10 mx-1"></div>

      <button
        class="flex items-center gap-2 px-3 py-2 rounded-full bg-blue-600 hover:bg-blue-500 text-white font-medium text-xs transition-all shadow-lg shadow-blue-900/20 group">
        <i data-lucide="target" class="w-3.5 h-3.5"></i>
        <span>Explain</span>
      </button>
    </div>
  </div>

  <!-- Gradient Overlay at Bottom -->
  <div
    class="fixed bottom-0 left-0 w-full h-24 bg-gradient-to-t from-[#191919] via-[#191919]/90 to-transparent pointer-events-none z-20">
  </div>

</body>

</html>
